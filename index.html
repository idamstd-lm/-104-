<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองเสื้อที่ระลึก 104 ปี</title>
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/-2D-f.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
        }
        /* Style for the iframe to ensure it covers the full viewport */
        #mainIframe {
            width: 100%;
            height: 100vh;
            display: block; /* Ensures no extra space around it */
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // URL of your Google Apps Script web app
            const web_app_url = 'https://script.google.com/macros/s/AKfycbyIw4cPyD0ZJT64RdN1dA_5u0WdgllkKXWEVEjSYmNg4tOhheStewaRWcxJpuXMQLz1/exec';
            
            // Function to check for In-App Browser, while excluding Google Chrome
            function is_InAppBrowser() {
                const userAgent = navigator.userAgent || navigator.vendor || window.opera;
                const isChrome = /Chrome/.test(userAgent);
                
                // Check for common in-app browser user agents, excluding Chrome
                return (
                    !isChrome && 
                   /FBAV|FBAN|Tiktok|Instagram|Twitter|Snapchat|Telegram|MicroMessenger|Pinterest|Reddit|Threads/i.test(userAgent)
                );
            }

            // Get the main iframe element
            const mainIframe = document.getElementById('mainIframe');
            const urlParams = new URLSearchParams(window.location.search);
            
            // If the URL already has the 'openExternalBrowser' parameter, we assume it's opened in a main browser
            if (urlParams.has('openExternalBrowser')) {
                mainIframe.src = web_app_url;
                return;
            }

            // Check if it's an In-App Browser and if so, show the modal
            if (is_InAppBrowser()) {
                const modal = document.getElementById('inAppBrowserModal');

                // Show the modal and hide the iframe
                modal.classList.remove('hidden');
                mainIframe.style.display = 'none';
                
            } else {
                // If it's not an In-App Browser, load the Apps Script URL directly into the iframe
                mainIframe.src = web_app_url;
            }
        });
    </script>
</head>
<body>
    <div id="inAppBrowserModal" class="fixed inset-0 bg-gray-900 bg-opacity-75 z-50 flex items-center justify-center p-4 hidden overflow-y-auto">
        <div class="bg-white rounded-lg shadow-xl w-full h-auto sm:max-w-md p-6 flex flex-col justify-center text-center my-auto">
            <div>
                <div class="flex flex-col items-center justify-center mb-4">
                    <img src="https://img2.pic.in.th/-2D-f.png" alt="โลโก้ 104 ปี" style="width: 100px; height: 100px;" class="mb-2 object-contain">
                </div>
                
                <h2 class="text-2xl font-bold text-gray-800 mb-2">ระบบจองเสื้อ 104 ปี</h2>
                <p class="text-gray-600 mb-4 text-sm">เพื่อประสิทธิภาพสูงสุดในการใช้งาน กรุณาเปิดหน้าเว็บนี้ในเบราว์เซอร์หลักค่ะ</p>
                
                <div class="text-left text-sm text-gray-700 mt-4 space-y-4">
                    <div class="bg-red-50 p-4 rounded-lg border border-red-200">
                        <p class="text-center text-base leading-relaxed text-gray-800">
                            กรุณาเปิดด้วยเบราว์เซอร์ หรือ เบราว์เซอร์ภายนอก<br>
                            ด้วยการไปกดปุ่ม <span class="text-red-600 font-bold text-lg">จุด 3 จุด ที่มุมบนขวาหรือ มุมล่างขวา</span><br>
                            แล้วเลือก <span class="text-red-600 font-bold text-lg">“เปิดในเบราว์เซอร์ภายนอก”</span>
                        </p>
                    </div>

                    <div class="flex justify-center mt-4">
                        <img src="https://img2.pic.in.th/6cd6a5f4404dc4e5d8f22b99233d07c0.png" alt="ขั้นตอนการเปิดเบราว์เซอร์" class="max-w-full h-auto rounded-lg shadow-md border border-gray-200">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <iframe id="mainIframe" scrolling="yes" src="https://script.google.com/macros/s/AKfycbyIw4cPyD0ZJT64RdN1dA_5u0WdgllkKXWEVEjSYmNg4tOhheStewaRWcxJpuXMQLz1/exec" frameborder="0"></iframe>
</body>
</html>
